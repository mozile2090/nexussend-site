<!DOCTYPE html>
<html lang="en" class="antialiased selection:bg-indigo-500 selection:text-white scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | NexusSend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body{background-color:#030712;} .glass-nav{background:rgba(3,7,18,0.7);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.05);}</style>
</head>
<body>
    <nav class="fixed w-full z-50 glass-nav"><div class="max-w-7xl mx-auto px-6 lg:px-8 flex items-center justify-between h-20"><a href="/index.html" class="flex items-center gap-3"><div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center"><svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></div><span class="font-bold text-white text-xl">Nexus<span class="text-indigo-400">Send</span></span></a><a href="/index.html" class="text-sm text-gray-400 hover:text-white">&larr; Back</a></div></nav>

    <main class="pt-32 pb-24 px-6 lg:px-8 max-w-xl mx-auto">
        <h1 class="text-4xl font-extrabold text-white mb-4">Contact Sales & Support</h1>
        <p class="text-gray-400 mb-10">Need a custom SLA or enterprise routing volume? Get in touch.</p>
        
        <form class="space-y-6 bg-gray-900 p-8 rounded-2xl border border-white/5">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Work Email</label>
                <input type="email" class="w-full bg-[#030712] border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-indigo-500" placeholder="you@company.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Monthly Volume (Requests)</label>
                <select class="w-full bg-[#030712] border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-indigo-500">
                    <option>Under 1 Million</option>
                    <option>1M - 10M</option>
                    <option>10M+</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Message</label>
                <textarea rows="4" class="w-full bg-[#030712] border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-indigo-500" placeholder="How can we help?"></textarea>
            </div>
            <button type="button" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition">Send Message</button>
        </form>
    </main>
</body>
</html>
